---
version: 0.2
phases: 
  install:
    runtime-versions:
      nodejs: 18
    commands: 
      - echo "insalling tools"
      - npm --v
      - node -v
      - npm install
  build:
    commands:
      - npm run build

  post_build:
    commands:
      - zip -j build.zip dist/frontend/browser/*
artifacts: 
  directory: build.zip